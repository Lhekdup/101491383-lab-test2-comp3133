<div class="character-grid">
  @if (characters().length > 0) {
    @for (character of characters(); track character.id) {
      <mat-card class="character-card">
        <img mat-card-image [src]="character.image || 'https://via.placeholder.com/200x300?text=No+Image'" [alt]="character.name">
        <mat-card-header>
          <mat-card-title>{{ character.name }}</mat-card-title>
          <mat-card-subtitle>{{ character.house || 'Unknown House' }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-actions>
          <button mat-button routerLink="/character/{{character.id}}">View Details</button>
        </mat-card-actions>
      </mat-card>
    }
  } @else {
    <p>Loading characters...</p>
  }
</div>
