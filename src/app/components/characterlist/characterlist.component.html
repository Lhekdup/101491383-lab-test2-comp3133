<div class="character-grid">
  <mat-card class="character-card" *ngFor="let character of characters">
    
    <img mat-card-image [src]="character.image || 'https://via.placeholder.com/200x300?text=No+Image'" [alt]="character.name">
    
    <mat-card-header>
      <mat-card-title>{{ character.name }}</mat-card-title>
      <mat-card-subtitle>{{ character.house || 'Unknown House' }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-actions>
      <button mat-button color="primary" [routerLink]="['/character', character.id]">
        View Details
      </button>
    </mat-card-actions>
    
  </mat-card>
</div>
